<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Drawing Board predicts SKU-level demand for new fashion products before you go to production. No historical data required." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#0d0d0d" />

  <title>new season · Drawing Board</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #0d0d0d;
      color: #ede8de;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 16px;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Nav */
    nav {
      padding: 28px 40px;
    }

    .wordmark {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      font-weight: 400;
      color: #7a8c35;
      letter-spacing: 0.04em;
      text-decoration: none;
    }

    /* Hero */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
    }

    .hero {
      max-width: 640px;
      width: 100%;
    }

    .headline {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.25rem, 5vw, 3.25rem);
      font-weight: 600;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: #ede8de;
      margin-bottom: 24px;
    }

    .subhead {
      font-family: 'IBM Plex Mono', monospace;
      font-size: clamp(0.875rem, 2vw, 1rem);
      font-weight: 400;
      line-height: 1.65;
      color: #ede8de;
      opacity: 0.72;
      margin-bottom: 44px;
      max-width: 520px;
    }

    .cta {
      display: inline-block;
      background-color: #7a8c35;
      color: #ede8de;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-decoration: none;
      padding: 14px 32px;
      border: none;
      cursor: pointer;
    }

    .cta:hover {
      background-color: #8fa03d;
    }

    .cta:focus-visible {
      outline: 2px solid #ede8de;
      outline-offset: 3px;
    }

    /* Footer */
    footer {
      padding: 24px 40px;
      text-align: left;
    }

    .footer-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: #ede8de;
      opacity: 0.36;
    }

    /* Mobile */
    @media (max-width: 600px) {
      nav {
        padding: 22px 24px;
      }

      main {
        padding: 40px 24px;
        align-items: flex-start;
        padding-top: 80px;
      }

      footer {
        padding: 20px 24px;
      }
    }
  </style>
</head>
<body>

  <nav>
    <span class="wordmark">new season</span>
  </nav>

  <main>
    <div class="hero">
      <h1 class="headline">Know before you commit.</h1>
      <p class="subhead">Drawing Board predicts SKU-level demand for new products before you go to production. No historical data required.</p>
      <a class="cta" href="https://tally.so/r/yPxqzB" target="_blank" rel="noopener noreferrer">Join the waitlist</a>
    </div>
  </main>

  <footer>
    <p class="footer-text">© 2026 new season</p>
  </footer>

</body>
</html>
